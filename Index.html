<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIKI.host | Launch Pad</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1a1f29; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #2d333f; margin-top: 40px; }
        textarea { width: 100%; height: 200px; background: #0b0e14; border: 1px solid #3b82f6; color: #10b981; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #3b82f6; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: center; background: #1e293b; border: 1px solid #3b82f6; }
    </style>
</head>
<body>
    <h1>🚀 FIKI.host</h1>
    <div class="card">
        <textarea id="htmlInput" placeholder="Paste your code here..."></textarea>
        <button onclick="deployProject()">Launch Project</button>
        <div id="status"></div>
    </div>

    <script>
        async function deployProject() {
            const htmlCode = document.getElementById('htmlInput').value;
            const status = document.getElementById('status');
            status.innerHTML = "🚀 Deploying...";
            status.style.display = "block";

            try {
                const response = await fetch('/.netlify/functions/deploy', {
                    method: 'POST',
                    body: JSON.stringify({ htmlCode })
                });
                const data = await response.json();
                if (data.url) {
                    status.innerHTML = `✅ Live! <br><br><a href="${data.url}" target="_blank" style="color: #10b981; font-weight: bold;">CLICK TO VIEW SITE</a>`;
                } else {
                    status.innerHTML = "❌ Launch failed. Check Netlify Variables.";
                }
            } catch (error) {
                status.innerHTML = "❌ Error: " + error.message;
            }
        }
    </script>
</body>
</html>
