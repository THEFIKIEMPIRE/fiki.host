<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIKI.host | Empire Dashboard</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: #1a1f29; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid #2d333f; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 200px; background: #0b0e14; border: 1px solid #3b82f6; color: #10b981; border-radius: 10px; padding: 10px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #3b82f6; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: center; background: #1e293b; border: 1px solid #3b82f6; line-height: 1.4; }
    </style>
</head>
<body>
    <h1 style="margin-top: 50px; letter-spacing: 2px;">🚀 FIKI.host</h1>
    <p style="color: #8892b0;">The Digital Engine of the Empire</p>
    
    <div class="card">
        <textarea id="htmlInput" placeholder="Paste your HTML code here..."></textarea>
        <button onclick="deployProject()">Launch Project</button>
        <div id="status"></div>
    </div>

    <script>
        async function deployProject() {
            const htmlCode = document.getElementById('htmlInput').value;
            const status = document.getElementById('status');
            
            if (!htmlCode) {
                alert("Please paste some code first!");
                return;
            }

            status.innerHTML = "⌛ Connecting to Netlify Engine...";
            status.style.display = "block";

            try {
                // This path MUST match your folder structure: netlify/functions/deploy.js
                const response = await fetch('/.netlify/functions/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ htmlCode })
                });

                const data = await response.json();

                if (data.url) {
                    status.innerHTML = `✅ **Project Live!** <br><br><a href="${data.url}" target="_blank" style="color: #10b981; font-weight: bold; text-decoration: none; border: 1px solid #10b981; padding: 8px 12px; border-radius: 5px; display: inline-block; margin-top: 10px;">VIEW SITE</a>`;
                } else {
                    status.innerHTML = "❌ **Launch Failed.** <br> Check your Netlify Environment Variables.";
                }
            } catch (error) {
                console.error(error);
                status.innerHTML = "❌ **Connection Failed.** <br> Ensure the 'deploy' function is active in Netlify.";
            }
        }
    </script>
</body>
</html>
